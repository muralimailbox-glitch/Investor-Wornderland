services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ootaos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ootaos
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ootaos']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
