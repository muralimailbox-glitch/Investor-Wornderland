services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ootaos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ootaos
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ootaos']
      interval: 5s
      timeout: 3s
      retries: 20

  # Dev-only S3-compatible storage. In production, Cloudflare R2 replaces this.
  # Both speak S3 API v4, so src/lib/storage/r2.ts works against either.
  minio:
    image: minio/minio:latest
    container_name: ootaos-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ootaos-local
      MINIO_ROOT_PASSWORD: ootaos-local-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: ootaos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ootaos-local ootaos-local-secret &&
      mc mb --ignore-existing local/ootaos-docs &&
      mc anonymous set none local/ootaos-docs &&
      echo 'bucket ootaos-docs ready'
      "

volumes:
  pgdata:
  miniodata:
